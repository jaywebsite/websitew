<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bioethanol Fireplace – 3D Model</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; color: #fff; }

    /* Canvas sits at z-index 0 */
    #canvas-container { position: fixed; inset: 0; z-index: 0; }

    /* All UI is above canvas */
    #hud {
      position: fixed; inset: 0; z-index: 100;
      pointer-events: none;
    }
    #hud > * { pointer-events: all; }

    #ui {
      position: absolute; top: 20px; left: 20px;
      pointer-events: none;
    }
    #ui h1 {
      font-size: clamp(0.9rem, 3.5vw, 1.4rem); font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: #f0c060; text-shadow: 0 0 20px rgba(240,150,30,0.6);
    }
    #ui p { font-size: clamp(0.6rem, 2vw, 0.75rem); color: #aaa; margin-top: 4px; letter-spacing: 0.05em; }

    #legend {
      position: absolute; top: 20px; right: 12px;
      display: flex; flex-direction: column; gap: 6px;
    }
    .legend-item { display: flex; align-items: center; gap: 7px; font-size: clamp(0.6rem, 2vw, 0.75rem); color: #ccc; }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

    /* Bottom controls */
    #controls {
      position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 10px; justify-content: center; align-items: center;
    }

    /* Side explode button */
    #btn-exploded {
      position: absolute; left: 20px; top: 50%; transform: translateY(-50%);
      writing-mode: vertical-rl; text-orientation: mixed;
      padding: 20px 12px; border-radius: 14px;
      font-size: 0.78rem; line-height: 1.4;
    }

    button {
      background: rgba(0,0,0,0.8);
      border: 2px solid rgba(240,160,30,0.85);
      color: #f0c060;
      padding: 10px 16px; border-radius: 20px;
      cursor: pointer; font-size: clamp(0.68rem, 2.5vw, 0.82rem);
      font-weight: 600;
      letter-spacing: 0.06em; white-space: nowrap;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      touch-action: manipulation; -webkit-tap-highlight-color: transparent;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 2px 12px rgba(0,0,0,0.6);
    }
    button:hover, button.active {
      background: rgba(240,150,30,0.4); border-color: #f0c060; color: #fff;
    }

    @media (max-width: 480px) {
      #legend { display: none; }
      #btn-exploded { left: 8px; font-size: 0.65rem; padding: 14px 8px; }
    }

    /* ── INTRO ── */
    #intro {
      position: fixed; inset: 0; z-index: 999;
      background: #0a0a0a; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    #intro.hide { animation: introExit 0.9s cubic-bezier(0.7,0,1,1) forwards; pointer-events: none; }
    @keyframes introExit { to { opacity: 0; transform: scale(1.06); } }
    #intro-fire { position: absolute; inset: 0; pointer-events: none; }
    .intro-group { position: relative; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .intro-line { font-size: clamp(0.7rem,1.5vw,0.95rem); letter-spacing: 0.45em; text-transform: uppercase; color: #f0a030; opacity: 0; animation: lineUp 0.7s cubic-bezier(0.22,1,0.36,1) forwards 0.4s; }
    .intro-title { font-size: clamp(2.8rem,8vw,6rem); font-weight: 900; letter-spacing: 0.08em; text-transform: uppercase; color: transparent; background: linear-gradient(135deg,#ff8c00,#ffd700 45%,#ff4500); -webkit-background-clip: text; background-clip: text; filter: drop-shadow(0 0 18px rgba(255,140,0,0.55)); opacity: 0; animation: titleReveal 1s cubic-bezier(0.22,1,0.36,1) forwards 0.75s; }
    .intro-divider { width: 0; height: 2px; background: linear-gradient(90deg,transparent,#f0a030,transparent); opacity: 0; animation: dividerGrow 0.8s cubic-bezier(0.22,1,0.36,1) forwards 1.0s; }
    .intro-sub { font-size: clamp(0.65rem,1.3vw,0.85rem); letter-spacing: 0.38em; text-transform: uppercase; color: #aaa; opacity: 0; animation: lineUp 0.7s cubic-bezier(0.22,1,0.36,1) forwards 1.2s; }
    .intro-skip { position: absolute; bottom: 40px; right: 50px; font-size: 0.72rem; letter-spacing: 0.15em; color: #555; text-transform: uppercase; cursor: pointer; border: 1px solid #333; padding: 6px 16px; border-radius: 20px; transition: color 0.2s, border-color 0.2s; opacity: 0; animation: lineUp 0.5s ease forwards 1.8s; }
    .intro-skip:hover { color: #f0a030; border-color: #f0a030; }
    .intro-loader { position: absolute; bottom: 48px; left: 50%; transform: translateX(-50%); width: 140px; height: 2px; background: #222; border-radius: 2px; overflow: hidden; opacity: 0; animation: lineUp 0.5s ease forwards 1.5s; }
    .intro-loader-bar { height: 100%; width: 0; background: linear-gradient(90deg,#ff8c00,#ffd700); border-radius: 2px; animation: loaderFill 2.2s cubic-bezier(0.4,0,0.2,1) forwards 1.6s; }
    @keyframes lineUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    @keyframes titleReveal { from { opacity:0; transform:translateY(22px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }
    @keyframes dividerGrow { from { width:0; opacity:0; } to { width:220px; opacity:1; } }
    @keyframes loaderFill { from { width:0; } to { width:100%; } }
  </style>
</head>
<body>

<!-- INTRO -->
<div id="intro">
  <canvas id="intro-fire"></canvas>
  <div class="intro-group">
    <span class="intro-line">Presents</span>
    <h1 class="intro-title">GROUP 12</h1>
    <div class="intro-divider"></div>
    <span class="intro-sub">Research · Bioethanol Fireplace 3D Model</span>
  </div>
  <div class="intro-loader"><div class="intro-loader-bar"></div></div>
  <div class="intro-skip" id="intro-skip">Skip ›</div>
</div>

<script>
(function() {
  const canvas = document.getElementById('intro-fire');
  const ctx = canvas.getContext('2d');
  let W, H;
  const particles = [];
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  class Particle {
    constructor() { this.reset(true); }
    reset(init) {
      this.x = W*0.3 + Math.random()*W*0.4; this.y = init ? Math.random()*H : H+10;
      this.vx = (Math.random()-0.5)*0.7; this.vy = -(1.2+Math.random()*2.2);
      this.life = 0; this.maxLife = 60+Math.random()*80;
      this.size = 2+Math.random()*5; this.hue = 20+Math.random()*30;
    }
    update() {
      this.x += this.vx + Math.sin(this.life*0.12)*0.4;
      this.y += this.vy; this.vy -= 0.015; this.life++;
      if (this.life > this.maxLife || this.y < -20) this.reset(false);
    }
    draw() {
      const p = this.life/this.maxLife;
      const a = p<0.2 ? p/0.2 : 1-(p-0.2)/0.8;
      ctx.beginPath(); ctx.arc(this.x, this.y, this.size*(1-p*0.5), 0, Math.PI*2);
      ctx.fillStyle = `hsla(${this.hue},100%,${55+p*20}%,${a*0.25})`; ctx.fill();
    }
  }
  for (let i=0; i<120; i++) particles.push(new Particle());
  let running = true;
  function loop() { if (!running) return; ctx.clearRect(0,0,W,H); particles.forEach(p=>{p.update();p.draw();}); requestAnimationFrame(loop); }
  loop();
  function dismiss() { running=false; const el=document.getElementById('intro'); el.classList.add('hide'); setTimeout(()=>el.remove(), 950); }
  setTimeout(dismiss, 3900);
  document.getElementById('intro-skip').addEventListener('click', dismiss);
})();
</script>

<!-- 3D Canvas -->
<div id="canvas-container"></div>

<!-- HUD layer sits above canvas -->
<div id="hud">
  <div id="ui" style="pointer-events:none">
    <h1>Bioethanol Fireplace</h1>
    <p>Drag / touch to rotate · Pinch or scroll to zoom</p>
  </div>

  <div id="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#88ccff;opacity:0.7;border:1px solid #88ccff"></div>Tempered Glass</div>
    <div class="legend-item"><div class="legend-dot" style="background:#c8a87a"></div>MDF Board Base</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d4c4a8"></div>Ceramic Fiber Wool</div>
    <div class="legend-item"><div class="legend-dot" style="background:#b0b8c0"></div>Steel Reservoir</div>
    <div class="legend-item"><div class="legend-dot" style="background:#ff6020"></div>Flame</div>
  </div>

  <!-- Left side explode button -->
  <button id="btn-exploded">💥 Explode</button>

  <!-- Bottom controls -->
  <div id="controls">
    <button id="btn-assembled" class="active">✦ Assembled</button>
    <button id="btn-flame">🔥 Flame</button>
  </div>
</div>


<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const container = document.getElementById('canvas-container');
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
container.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1a1a);
scene.fog = new THREE.Fog(0x1a1a1a, 8, 20);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.01, 100);
camera.position.set(window.innerWidth < 600 ? 2.8 : 3.5, window.innerWidth < 600 ? 2.2 : 2.8, window.innerWidth < 600 ? 2.8 : 3.5);
camera.lookAt(0, 0.3, 0);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.06;
controls.minDistance = 1.5; controls.maxDistance = 9;
controls.maxPolarAngle = Math.PI * 0.52; controls.target.set(0, 0.3, 0);
controls.touches = { ONE: THREE.TOUCH.ROTATE, TWO: THREE.TOUCH.DOLLY_PAN };

scene.add(new THREE.AmbientLight(0xffeedd, 0.5));
const dirLight = new THREE.DirectionalLight(0xfff5e0, 1.2);
dirLight.position.set(4,7,5); dirLight.castShadow = true;
dirLight.shadow.mapSize.set(2048,2048);
dirLight.shadow.camera.near = 0.1; dirLight.shadow.camera.far = 30;
dirLight.shadow.camera.left = -4; dirLight.shadow.camera.right = 4;
dirLight.shadow.camera.top = 4; dirLight.shadow.camera.bottom = -4;
scene.add(dirLight);
const fillLight = new THREE.DirectionalLight(0x8090ff, 0.3);
fillLight.position.set(-3, 2, -3);
scene.add(fillLight);
const flameLight = new THREE.PointLight(0xff6020, 2.5, 2.5);
flameLight.position.set(0,0.55,0); scene.add(flameLight);

const ground = new THREE.Mesh(new THREE.PlaneGeometry(12,12), new THREE.MeshStandardMaterial({color:0x111111,roughness:0.95}));
ground.rotation.x = -Math.PI/2; ground.position.y = -0.01; ground.receiveShadow = true; scene.add(ground);

const glassMat = new THREE.MeshPhysicalMaterial({color:0xd0eeff,metalness:0,roughness:0.05,transmission:0.88,thickness:0.06,transparent:true,opacity:0.35,side:THREE.DoubleSide,envMapIntensity:1.2,ior:1.52});
const mdfMat = new THREE.MeshStandardMaterial({color:0xc8a060,roughness:0.85});
const mdfEdgeMat = new THREE.MeshStandardMaterial({color:0xb08040,roughness:0.9});
const steelMat = new THREE.MeshStandardMaterial({color:0xb8c4cc,roughness:0.25,metalness:0.85});
const fiberMat = new THREE.MeshStandardMaterial({color:0xe0d8c8,roughness:1.0});

function box(w,h,d,mat) { const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); return m; }

// Reservoir
const RW=1.2,RH=0.18,RD=0.32;
const reservoirGroup = new THREE.Group();
const ro = box(RW,RH,RD,steelMat); ro.castShadow=true; ro.receiveShadow=true; reservoirGroup.add(ro);
const ri = box(RW-0.03,RH-0.03,RD-0.03,new THREE.MeshStandardMaterial({color:0x222222,roughness:0.9,metalness:0.1}));
ri.position.y=0.015; reservoirGroup.add(ri);
const hMat = new THREE.MeshStandardMaterial({color:0x8899aa,roughness:0.2,metalness:0.9});
const hb = box(0.18,0.02,0.02,hMat); hb.position.set(0,RH/2+0.01,0); reservoirGroup.add(hb);
[-1,1].forEach(s=>{ const r=box(RW+0.01,0.012,0.012,hMat); r.position.set(0,RH/2,s*(RD/2)); reservoirGroup.add(r); });
reservoirGroup.position.set(0,RH/2,0);

// Absorber
const FW=RW-0.06,FH=0.05,FD=RD-0.06;
const absorberGroup = new THREE.Group();
const fGeo = new THREE.BoxGeometry(FW,FH,FD,20,4,10);
const fPos = fGeo.attributes.position;
for(let i=0;i<fPos.count;i++){
  if(fPos.getY(i)>0) fPos.setY(i, fPos.getY(i)+Math.sin(fPos.getX(i)*8)*0.008+Math.cos(fPos.getZ(i)*10)*0.006+Math.random()*0.005);
}
fGeo.computeVertexNormals();
const fm = new THREE.Mesh(fGeo,fiberMat); fm.castShadow=true; absorberGroup.add(fm);
absorberGroup.position.set(0,RH+FH/2,0);

// MDF Base
const BW=2.0,BH=0.22,BD=0.9;
const baseGroup = new THREE.Group();
const bs = box(BW,BH,BD,mdfMat); bs.castShadow=true; bs.receiveShadow=true; baseGroup.add(bs);
const lipH=BH*0.6,lipT=0.04;
[-1,1].forEach(s=>{ const l=box(BW+lipT*2,lipH,lipT,mdfEdgeMat); l.position.set(0,-BH/2+lipH/2-0.01,s*(BD/2+lipT/2)); l.castShadow=true; baseGroup.add(l); });
[-1,1].forEach(s=>{ const l=box(lipT,lipH,BD+lipT*2,mdfEdgeMat); l.position.set(s*(BW/2+lipT/2),-BH/2+lipH/2-0.01,0); l.castShadow=true; baseGroup.add(l); });
const rc = box(RW+0.08,0.01,RD+0.08,new THREE.MeshStandardMaterial({color:0x5a3a10,roughness:0.95}));
rc.position.set(0,BH/2,0); baseGroup.add(rc);
baseGroup.position.set(0,RH+FH+BH/2-0.02,0);

// Glass enclosure
const GW=1.55,GH=0.74,GD=0.66,GT=0.025;
const glassGroup = new THREE.Group();
[[GW,GH,GT,0,GH/2,-GD/2],[GW,GH,GT,0,GH/2,GD/2],[GT,GH,GD,-GW/2,GH/2,0],[GT,GH,GD,GW/2,GH/2,0]].forEach(([w,h,d,x,y,z])=>{
  const p=box(w,h,d,glassMat); p.position.set(x,y,z); glassGroup.add(p);
});
const feMat = new THREE.MeshStandardMaterial({color:0x888888,roughness:0.3,metalness:0.9});
const eW=0.015;
function addEdge(sx,sy,sz,px,py,pz){ const e=box(sx,sy,sz,feMat); e.position.set(px,py,pz); glassGroup.add(e); }
addEdge(GW+eW,eW,eW,0,0,-GD/2); addEdge(GW+eW,eW,eW,0,0,GD/2);
addEdge(eW,eW,GD+eW,-GW/2,0,0); addEdge(eW,eW,GD+eW,GW/2,0,0);
addEdge(eW,GH,eW,-GW/2,GH/2,-GD/2); addEdge(eW,GH,eW,GW/2,GH/2,-GD/2);
addEdge(eW,GH,eW,-GW/2,GH/2,GD/2);  addEdge(eW,GH,eW,GW/2,GH/2,GD/2);
const mdfTop = RH+FH+BH-0.02;
glassGroup.position.set(0,mdfTop,0);

// Flames
const flameGroup = new THREE.Group();
const flames = [];
for(let i=0;i<14;i++){
  const h=0.12+Math.random()*0.18, r=0.018+Math.random()*0.022;
  const hue=0.05+Math.random()*0.06;
  const fl = new THREE.Mesh(new THREE.ConeGeometry(r,h,6,1,true), new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(hue,1,0.55),transparent:true,opacity:0.75+Math.random()*0.2,side:THREE.DoubleSide,depthWrite:false,blending:THREE.AdditiveBlending}));
  fl.position.set((Math.random()-0.5)*(RW-0.1), h/2, (Math.random()-0.5)*(RD-0.06));
  fl.userData={speed:1.5+Math.random()*2,phase:Math.random()*Math.PI*2,baseHue:hue};
  flameGroup.add(fl); flames.push(fl);
}
flameGroup.position.set(0,mdfTop+0.01,0);

[reservoirGroup,absorberGroup,baseGroup,glassGroup,flameGroup].forEach(p=>scene.add(p));

// Labels
function makeLabel(text,color='#fff'){
  const c=document.createElement('canvas'); c.width=320; c.height=64;
  const x=c.getContext('2d');
  x.fillStyle='rgba(0,0,0,0.55)'; x.roundRect(4,10,312,44,8); x.fill();
  x.font='bold 20px Segoe UI,sans-serif'; x.fillStyle=color; x.textAlign='center'; x.fillText(text,160,38);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(c),depthWrite:false,transparent:true}));
  sp.scale.set(1.0,0.2,1); return sp;
}
const labelEnclosure=makeLabel('ENCLOSURE · Tempered Glass','#88ddff'); labelEnclosure.position.set(1.25,mdfTop+GH+0.12,0); scene.add(labelEnclosure);
const labelBase=makeLabel('MDF BOARD BASE','#f0c060'); labelBase.position.set(1.4,mdfTop+0.1,0); scene.add(labelBase);
const labelAbsorber=makeLabel('FUEL ABSORBER · Ceramic Fiber','#e8e0c8'); labelAbsorber.position.set(1.4,RH+FH+0.08,0); scene.add(labelAbsorber);
const labelReservoir=makeLabel('BIOETHANOL RESERVOIR · Steel','#b8c8d8'); labelReservoir.position.set(1.4,RH*0.5,0); scene.add(labelReservoir);
const labels=[labelEnclosure,labelBase,labelAbsorber,labelReservoir];

// State
const assembledPos = { reservoir:reservoirGroup.position.clone(), absorber:absorberGroup.position.clone(), base:baseGroup.position.clone(), glass:glassGroup.position.clone(), flame:flameGroup.position.clone() };
const explodedOff = { reservoir:new THREE.Vector3(0,-0.7,0), absorber:new THREE.Vector3(0,-0.25,0), base:new THREE.Vector3(0,0,0), glass:new THREE.Vector3(0,0.55,0), flame:new THREE.Vector3(0,0.55,0) };
let exploded=false, flameOn=true, transT=0, transitioning=false, transDir=0;
function lerp3(a,b,t){ return new THREE.Vector3().lerpVectors(a,b,t); }
function setExploded(v){ exploded=v; transitioning=true; transDir=v?1:-1; }
function eio(t){ return t<0.5?2*t*t:-1+(4-2*t)*t; }

// Button listeners
const btnAssembled=document.getElementById('btn-assembled');
const btnExploded=document.getElementById('btn-exploded');
const btnFlame=document.getElementById('btn-flame');

btnAssembled.addEventListener('click',()=>{ setExploded(false); btnAssembled.classList.add('active'); btnExploded.classList.remove('active'); });
btnExploded.addEventListener('click',()=>{ setExploded(true); btnExploded.classList.add('active'); btnAssembled.classList.remove('active'); });
btnFlame.addEventListener('click',()=>{ flameOn=!flameOn; flameGroup.visible=flameOn; flameLight.intensity=flameOn?2.5:0; btnFlame.classList.toggle('active',flameOn); });

// Animate
const clock = new THREE.Clock();
renderer.setAnimationLoop(()=>{
  const t=clock.getElapsedTime();
  if(transitioning){
    transT=Math.min(1,Math.max(0,transT+transDir*0.035));
    const e=eio(transT);
    reservoirGroup.position.copy(lerp3(assembledPos.reservoir, assembledPos.reservoir.clone().add(explodedOff.reservoir),e));
    absorberGroup.position.copy(lerp3(assembledPos.absorber, assembledPos.absorber.clone().add(explodedOff.absorber),e));
    glassGroup.position.copy(lerp3(assembledPos.glass, assembledPos.glass.clone().add(explodedOff.glass),e));
    flameGroup.position.copy(lerp3(assembledPos.flame, assembledPos.flame.clone().add(explodedOff.flame),e));
    if(transT<=0||transT>=1) transitioning=false;
  }
  if(flameOn){
    flames.forEach(fl=>{
      const ud=fl.userData, f=Math.sin(t*ud.speed+ud.phase), f2=Math.sin(t*ud.speed*1.7+ud.phase+1.2);
      fl.position.x+=Math.sin(t*ud.speed*0.8+ud.phase)*0.0008;
      fl.position.z+=Math.cos(t*ud.speed*0.6+ud.phase)*0.0005;
      fl.scale.set(0.8+f2*0.2, 0.75+f*0.25, 0.8+f*0.2);
      fl.material.color.setHSL(ud.baseHue+Math.sin(t*2+ud.phase)*0.04,1,0.5+f*0.1);
      fl.material.opacity=0.55+f2*0.3;
    });
    flameLight.intensity=2.0+Math.sin(t*8.3)*0.5+Math.sin(t*13.7)*0.3;
    flameLight.color.setHSL(0.06+Math.sin(t*3)*0.02,1,0.5);
  }
  labels.forEach(l=>l.lookAt(camera.position));
  controls.update();
  renderer.render(scene,camera);
});

window.addEventListener('resize',()=>{
  camera.aspect=window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>
</body>
</html>
