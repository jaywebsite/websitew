<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arduino UNO – LCD Kalapastangan</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #dde1e7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', monospace;
      padding: 40px 20px;
    }
    .scene {
      display: flex;
      align-items: center;
      gap: 0;
      flex-wrap: nowrap;
      justify-content: center;
    }

    /* ═══════════════════════════════════════
       USB CABLE (grey flat cable + white plug)
    ═══════════════════════════════════════ */
    .usb-wrap {
      display: flex;
      align-items: center;
      margin-right: -2px;
      z-index: 10;
    }
    .usb-cable-wire {
      width: 80px;
      height: 8px;
      background: #b0b4bb;
      border-radius: 4px 0 0 4px;
    }
    .usb-plug-body {
      width: 48px;
      height: 36px;
      background: #d8d8d8;
      border-radius: 5px;
      position: relative;
      box-shadow: 2px 2px 8px rgba(0,0,0,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .usb-plug-inner {
      width: 28px;
      height: 18px;
      background: #aaa;
      border-radius: 3px;
    }

    /* ═══════════════════════════════════════
       ARDUINO BOARD (SVG-based for accuracy)
    ═══════════════════════════════════════ */
    .arduino-wrap {
      position: relative;
      width: 360px;
      height: 280px;
      flex-shrink: 0;
    }
    .arduino-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* LED animations */
    @keyframes blinkGreen { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes blinkAmber { 0%,100%{opacity:1} 50%{opacity:.15} }
    .led-on-dot  { animation: blinkGreen 1.4s ease-in-out infinite; }
    .led-rx-dot  { animation: blinkAmber 0.5s ease-in-out infinite alternate; }
    .led-tx-dot  { animation: blinkAmber 0.5s 0.25s ease-in-out infinite alternate; }

    /* ═══════════════════════════════════════
       WIRES SVG between board and LCD
    ═══════════════════════════════════════ */
    .wires-wrap {
      width: 60px;
      height: 280px;
      position: relative;
      flex-shrink: 0;
    }
    .wires-wrap svg { overflow: visible; }

    /* ═══════════════════════════════════════
       LCD MODULE
    ═══════════════════════════════════════ */
    .lcd-module {
      background: #2a7a2e;
      border-radius: 7px;
      padding: 12px 14px 14px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.55);
      border: 2px solid #1a5c1d;
      flex-shrink: 0;
    }
    .lcd-pin-strip { display: flex; gap: 3.5px; margin-bottom: 8px; }
    .lcd-pin-strip span {
      width: 5px; height: 10px;
      background: #d4c870;
      border-radius: 1px 1px 0 0;
    }
    .lcd-screen {
      background: #0b2a50;
      border-radius: 3px;
      padding: 8px 10px 10px;
      border: 2px solid #061828;
      position: relative;
    }
    .lcd-screen::after {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0, transparent 3px,
        rgba(0,0,0,0.09) 3px, rgba(0,0,0,0.09) 4px
      );
      pointer-events: none; border-radius: 3px; z-index: 3;
    }
    .lcd-row { display: flex; height: 20px; align-items: center; margin-bottom: 3px; }
    .lcd-row:last-child { margin-bottom: 0; }
    .lcd-cell {
      width: 9px; height: 15px; margin-right: 1px;
      display: flex; align-items: center; justify-content: center;
      font-size: 9.5px; color: #9dd5f5;
      text-shadow: 0 0 7px #7bbfe8, 0 0 12px #4aacdd;
      font-family: 'Courier New', monospace; font-weight: bold;
      position: relative; user-select: none;
    }
    .lcd-cell.cursor::after {
      content: ''; position: absolute;
      bottom: 0; left: 0; right: 0; height: 2px;
      background: #9dd5f5;
      animation: cur 0.8s step-end infinite;
      box-shadow: 0 0 5px #9dd5f5;
    }
    @keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }
    .lcd-pcb-label {
      font-size: 5.5px; color: #88cc88;
      text-align: right; margin-top: 5px;
      letter-spacing: 1.5px; opacity: .65;
    }

    /* ═══════════════════════════════════════
       CONTROLS
    ═══════════════════════════════════════ */
    .controls {
      margin-top: 28px;
      display: flex; gap: 14px; align-items: center;
      flex-wrap: wrap; justify-content: center;
    }
    .btn {
      padding: 9px 22px; border: none; border-radius: 5px;
      cursor: pointer; font-family: 'Courier New', monospace;
      font-size: 13px; font-weight: bold;
      transition: filter .15s, transform .1s;
    }
    .btn:active { transform: scale(0.96); }
    .btn-run  { background: #00c853; color: #fff; }
    .btn-stop { background: #d32f2f; color: #fff; }
    .btn-run:hover  { filter: brightness(1.15); }
    .btn-stop:hover { filter: brightness(1.15); }
    .speed-lbl { font-size: 12px; color: #555; }
    .speed-sel {
      padding: 7px 10px; border-radius: 4px; border: 1px solid #bbb;
      font-family: 'Courier New', monospace; font-size: 12px;
      background: #fff; cursor: pointer;
    }
    .footer { margin-top: 14px; font-size: 11px; color: #888; text-align: center; }
    .footer b { color: #1b6db5; }
  </style>
</head>

<script>
const LYRICS = [
  "Mamamatay akong","nakangiti",
  "Kapag ikaw ang","nasa aking tabi","",
  "Mabubuhay akong","nagsisisi",
  "Kapag isang araw","hindi kita","mapangiti","",
  "Kalapastangan ang","'di ka ibigin",
  "Kalokohan ang","'di ka isipin","",
  "Kung ang mundo ay","biglang gugunawin",
  "Ikaw ang una kong","hahanapin","",
  "~~~~~~~~~~~~~~~~"," END OF SONG :) ","~~~~~~~~~~~~~~~~","","",
];

const COLS=20,ROWS=4;
const grid=[];
for(let r=0;r<ROWS;r++){
  const rowEl=document.getElementById('row'+r);
  const cells=[];
  for(let c=0;c<COLS;c++){
    const d=document.createElement('div');
    d.className='lcd-cell';d.textContent='\u00A0';
    rowEl.appendChild(d);cells.push(d);
  }
  grid.push(cells);
}
function clearGrid(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
    grid[r][c].textContent='\u00A0';grid[r][c].classList.remove('cursor');
  }
}
let buf=['','','',''];
function renderBuf(){
  for(let r=0;r<ROWS;r++){
    const line=buf[r].padEnd(COLS,' ').substring(0,COLS);
    for(let c=0;c<COLS;c++)
      grid[r][c].textContent=line[c]===' '?'\u00A0':line[c];
  }
}
function centre(s){
  s=s.substring(0,COLS);
  const pad=Math.floor((COLS-s.length)/2);
  return ' '.repeat(pad)+s;
}
let timer=null,running=false,lyricsIdx=0,charIdx=0,screenRow=0,curR=0,curC=0;
function showCursor(){
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)grid[r][c].classList.remove('cursor');
  if(curR>=0&&curR<ROWS&&curC>=0&&curC<COLS)grid[curR][curC].classList.add('cursor');
}
function scrollUp(){
  buf[0]=buf[1];buf[1]=buf[2];buf[2]=buf[3];buf[3]='';
  renderBuf();if(screenRow>0)screenRow--;
}
function getSpeed(){return parseInt(document.getElementById('speedSel').value);}
function resetState(){
  clearInterval(timer);timer=null;running=false;
  lyricsIdx=charIdx=screenRow=0;buf=['','','',''];clearGrid();
}
function tick(){
  if(lyricsIdx>=LYRICS.length){
    clearInterval(timer);timer=null;running=false;setLedL(false);
    setTimeout(()=>{resetState();showIdle();},2500);return;
  }
  const line=centre(LYRICS[lyricsIdx]);
  if(charIdx<line.length){
    if(screenRow>=ROWS){scrollUp();screenRow=ROWS-1;}
    buf[screenRow]=buf[screenRow].substring(0,charIdx)+line[charIdx];
    const ch=line[charIdx];
    grid[screenRow][charIdx].textContent=ch===' '?'\u00A0':ch;
    curR=screenRow;curC=charIdx+1;showCursor();charIdx++;
  }else{
    buf[screenRow]=line;renderBuf();
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)grid[r][c].classList.remove('cursor');
    screenRow++;
    if(screenRow>=ROWS){scrollUp();screenRow=ROWS-1;}
    charIdx=0;lyricsIdx++;
  }
}
function startTyping(){running=true;setLedL(true);timer=setInterval(tick,getSpeed());}
function setLedL(on){
  const el=document.getElementById('ledLdot');
  if(on){el.setAttribute('fill','#ffee58');el.setAttribute('filter','url(#glow-green)');}
  else{el.setAttribute('fill','#f44336');el.removeAttribute('filter');}
}
function showIdle(){
  buf=[centre('KALAPASTANGAN'),centre('- fitterkarma -'),centre('Press  Run'),centre('to  begin...')];
  renderBuf();
}
document.getElementById('btnRun').addEventListener('click',()=>{if(running)return;resetState();startTyping();});
document.getElementById('btnStop').addEventListener('click',()=>{clearInterval(timer);timer=null;running=false;setLedL(false);});
document.getElementById('speedSel').addEventListener('change',()=>{if(running){clearInterval(timer);timer=setInterval(tick,getSpeed());}});
window.addEventListener('load',showIdle);
</script>
</body>
</html>
